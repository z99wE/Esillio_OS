version: "3.8"

services:
  backend:
    build: 
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - AI_RUNTIME_DEVICE=amd_rocm
      - MODEL_WEIGHTS=gemma-4-9b-it-amd-rocm
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: frontend.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
